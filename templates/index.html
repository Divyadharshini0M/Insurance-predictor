<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsureAI - Insurance Cost Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<main class="page-shell">
    <section class="app-card">
        <div class="hero">
            <span class="eyebrow">Insurance Cost Predictor</span>
            <h1>Estimate your premium with a cleaner, faster workflow.</h1>
            <p>Enter a few personal and health details to get an instant insurance cost estimate.</p>
        </div>

        <form action="/predict" method="POST" class="prediction-form">
            <div class="form-grid">
                <label class="field">
                    <span>Age</span>
                    <input type="number" name="age" placeholder="Enter age" required>
                </label>

                <label class="field">
                    <span>Gender</span>
                    <select name="sex" required>
                        <option value="">Select gender</option>
                        <option value="female">Female</option>
                        <option value="male">Male</option>
                    </select>
                </label>

                <label class="field">
                    <span>BMI</span>
                    <input type="number" step="0.1" name="bmi" placeholder="Enter BMI" required>
                </label>

                <label class="field">
                    <span>Children</span>
                    <input type="number" name="children" placeholder="Number of children" required>
                </label>

                <label class="field">
                    <span>Smoking Status</span>
                    <select name="smoker" required>
                        <option value="">Select status</option>
                        <option value="no">Non-smoker</option>
                        <option value="yes">Smoker</option>
                    </select>
                </label>

                <label class="field">
                    <span>Region</span>
                    <select name="region" required>
                        <option value="">Select region</option>
                        <option value="southwest">Southwest</option>
                        <option value="southeast">Southeast</option>
                        <option value="northwest">Northwest</option>
                        <option value="northeast">Northeast</option>
                    </select>
                </label>
            </div>

            <button type="submit" class="primary-button">
                <span>Predict Insurance Cost</span>
                <i class="fas fa-arrow-right" aria-hidden="true"></i>
            </button>
        </form>

        {% if prediction_text %}
        <div class="result" role="status" aria-live="polite">
            <span class="result-label">Estimated Insurance Cost (INR)</span>
            <p>{{ prediction_text }}</p>
        </div>
        {% endif %}
    </section>
</main>
</body>
</html>
